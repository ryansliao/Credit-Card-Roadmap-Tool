services:
  sqlserver:
    # Azure SQL Edge is the ARM64-native SQL Server variant — runs natively on
    # Apple Silicon without QEMU emulation (mssql/server:2022 crashes under QEMU).
    image: mcr.microsoft.com/azure-sql-edge:latest
    platform: linux/arm64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CardSolver_Dev1!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
